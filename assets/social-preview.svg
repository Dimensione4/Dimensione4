<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="75%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#0E2226"/>
      <stop offset="55%" stop-color="#0B1216"/>
      <stop offset="100%" stop-color="#0A0E12"/>
    </radialGradient>
    <linearGradient id="hfade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4D4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4D4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00D4D4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4D4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00D4D4" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- perspective grid -->
  <g opacity="0.45">
    <g stroke="url(#vfade)" stroke-width="1.2">
      <line x1="640" y1="400" x2="-260" y2="660"/>
      <line x1="640" y1="400" x2="-40" y2="660"/>
      <line x1="640" y1="400" x2="180" y2="660"/>
      <line x1="640" y1="400" x2="400" y2="660"/>
      <line x1="640" y1="400" x2="580" y2="660"/>
      <line x1="640" y1="400" x2="700" y2="660"/>
      <line x1="640" y1="400" x2="880" y2="660"/>
      <line x1="640" y1="400" x2="1100" y2="660"/>
      <line x1="640" y1="400" x2="1320" y2="660"/>
      <line x1="640" y1="400" x2="1540" y2="660"/>
    </g>
    <g stroke="#00D4D4">
      <line x1="0" y1="440" x2="1280" y2="440" opacity="0.07"/>
      <line x1="0" y1="480" x2="1280" y2="480" opacity="0.11"/>
      <line x1="0" y1="530" x2="1280" y2="530" opacity="0.16"/>
      <line x1="0" y1="590" x2="1280" y2="590" opacity="0.22"/>
    </g>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="url(#hfade)" stroke-width="2" filter="url(#glow)"/>
  </g>

  <!-- tesseract -->
  <g transform="translate(1030,250)">
    <rect x="-78" y="-78" width="156" height="156" fill="none" stroke="#00D4D4" stroke-width="2.2" opacity="0.9" filter="url(#glow)" transform="rotate(12)"/>
    <rect x="-42" y="-42" width="84" height="84" fill="none" stroke="#00AAAA" stroke-width="1.6" opacity="0.85" transform="rotate(-8)"/>
    <g stroke="#0E7C7B" stroke-width="1.2" opacity="0.6">
      <line x1="-74" y1="-92" x2="-44" y2="-46"/>
      <line x1="92" y1="-74" x2="46" y2="-44"/>
      <line x1="-92" y1="74" x2="-46" y2="44"/>
      <line x1="74" y1="92" x2="44" y2="46"/>
    </g>
    <circle r="6" fill="#00D4D4" filter="url(#glow)"/>
  </g>

  <!-- particles -->
  <g fill="#00D4D4">
    <circle cx="820" cy="130" r="2.5" opacity="0.5"/>
    <circle cx="1180" cy="470" r="2" opacity="0.4"/>
    <circle cx="900" cy="430" r="1.8" opacity="0.4"/>
    <circle cx="1120" cy="90" r="2.8" opacity="0.55"/>
    <circle cx="740" cy="330" r="1.6" opacity="0.35"/>
  </g>

  <!-- text -->
  <g font-family="Helvetica, Arial, sans-serif">
    <text x="90" y="255" font-family="'Courier New', monospace" font-size="24" fill="#0E7C7B" letter-spacing="2">&lt;/&gt; partner tecnologico per PMI e startup</text>
    <text x="88" y="350" font-weight="700" font-size="88" letter-spacing="10" fill="#F4F1EA">DIMENSIONE <tspan fill="#00D4D4" filter="url(#glow)">4</tspan></text>
    <rect x="92" y="378" width="620" height="5" rx="2.5" fill="#00D4D4"/>
    <text x="90" y="440" font-size="30" letter-spacing="2.5" fill="#9AA5A6">Software su misura · Automazioni AI · Piattaforme digitali</text>
    <text x="90" y="560" font-size="24" fill="#555555" letter-spacing="1.5">dimensione4.it · La dimensione che manca alla tua attività</text>
  </g>

  <rect x="1" y="1" width="1278" height="638" rx="16" stroke="#134C4C" stroke-width="2" fill="none"/>
</svg>
