<svg width="1000" height="280" viewBox="0 0 1000 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="78%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#0E2226"/>
      <stop offset="55%" stop-color="#0B1216"/>
      <stop offset="100%" stop-color="#0A0E12"/>
    </radialGradient>
    <linearGradient id="tealFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4D4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4D4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00D4D4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gridFadeV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4D4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00D4D4" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="frame">
      <rect width="1000" height="280" rx="12"/>
    </clipPath>
    <style>
      .title { font-family: Helvetica, Arial, sans-serif; font-weight: 700; font-size: 46px; letter-spacing: 6px; fill: #F4F1EA; }
      .four  { fill: #00D4D4; }
      .tag   { font-family: Helvetica, Arial, sans-serif; font-weight: 400; font-size: 17px; letter-spacing: 1.5px; fill: #9AA5A6; }
      .mono  { font-family: 'Courier New', monospace; font-size: 13px; fill: #0E7C7B; letter-spacing: 1px; }
    </style>
  </defs>

  <g clip-path="url(#frame)">
    <!-- background -->
    <rect width="1000" height="280" fill="url(#bgGlow)"/>

    <!-- perspective grid, bottom -->
    <g opacity="0.5">
      <!-- converging vertical lines -->
      <g stroke="url(#gridFadeV)" stroke-width="1">
        <line x1="500" y1="170" x2="-200" y2="290"/>
        <line x1="500" y1="170" x2="-40" y2="290"/>
        <line x1="500" y1="170" x2="120" y2="290"/>
        <line x1="500" y1="170" x2="280" y2="290"/>
        <line x1="500" y1="170" x2="440" y2="290"/>
        <line x1="500" y1="170" x2="560" y2="290"/>
        <line x1="500" y1="170" x2="720" y2="290"/>
        <line x1="500" y1="170" x2="880" y2="290"/>
        <line x1="500" y1="170" x2="1040" y2="290"/>
        <line x1="500" y1="170" x2="1200" y2="290"/>
      </g>
      <!-- moving horizon lines -->
      <g stroke="#00D4D4" stroke-width="1">
        <line x1="0" y1="0" x2="1000" y2="0" opacity="0.06" transform="translate(0,190)">
          <animateTransform attributeName="transform" type="translate" values="0,190;0,205" dur="3s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="0" x2="1000" y2="0" opacity="0.10" transform="translate(0,205)">
          <animateTransform attributeName="transform" type="translate" values="0,205;0,224" dur="3s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="0" x2="1000" y2="0" opacity="0.15" transform="translate(0,224)">
          <animateTransform attributeName="transform" type="translate" values="0,224;0,248" dur="3s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="0" x2="1000" y2="0" opacity="0.20" transform="translate(0,248)">
          <animateTransform attributeName="transform" type="translate" values="0,248;0,280" dur="3s" repeatCount="indefinite"/>
        </line>
      </g>
      <!-- horizon glow -->
      <line x1="0" y1="170" x2="1000" y2="170" stroke="url(#tealFade)" stroke-width="1.5" filter="url(#glow)"/>
    </g>

    <!-- tesseract, right side -->
    <g transform="translate(810,105)">
      <!-- outer square -->
      <g stroke="#00D4D4" stroke-width="1.6" opacity="0.9">
        <rect x="-52" y="-52" width="104" height="104" fill="none" filter="url(#glow)">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="36s" repeatCount="indefinite"/>
        </rect>
      </g>
      <!-- inner square, counter-rotation -->
      <g stroke="#00AAAA" stroke-width="1.2" opacity="0.85">
        <rect x="-28" y="-28" width="56" height="56" fill="none">
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="24s" repeatCount="indefinite"/>
        </rect>
      </g>
      <!-- connecting diagonals -->
      <g stroke="#0E7C7B" stroke-width="1" opacity="0.6">
        <line x1="-52" y1="-52" x2="-28" y2="-28"/>
        <line x1="52" y1="-52" x2="28" y2="-28"/>
        <line x1="-52" y1="52" x2="-28" y2="28"/>
        <line x1="52" y1="52" x2="28" y2="28"/>
      </g>
      <!-- pulsing core -->
      <circle r="4" fill="#00D4D4" filter="url(#glow)">
        <animate attributeName="r" values="3;5.5;3" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;1;0.7" dur="2.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- floating particles -->
    <g fill="#00D4D4">
      <circle cx="640" cy="60" r="1.6" opacity="0.5">
        <animate attributeName="opacity" values="0.15;0.7;0.15" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="930" cy="210" r="1.4" opacity="0.4">
        <animate attributeName="opacity" values="0.1;0.6;0.1" dur="4.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="700" cy="200" r="1.2" opacity="0.4">
        <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="880" cy="40" r="1.8" opacity="0.5">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- text block -->
    <g transform="translate(70,0)">
      <text x="0" y="118" class="mono">&lt;/&gt; partner tecnologico per PMI e startup</text>
      <text x="0" y="168" class="title">DIMENSIONE <tspan class="four" filter="url(#glow)">4</tspan></text>
      <!-- animated underline -->
      <rect x="2" y="182" height="3" rx="1.5" fill="#00D4D4">
        <animate attributeName="width" values="0;340;340;0;0" keyTimes="0;0.35;0.75;0.95;1" dur="6s" repeatCount="indefinite"/>
      </rect>
      <text x="0" y="216" class="tag">Software su misura · Automazioni AI · Piattaforme digitali</text>
    </g>

    <!-- thin brand border -->
    <rect x="0.5" y="0.5" width="999" height="279" rx="12" stroke="#134C4C" fill="none"/>
  </g>
</svg>
