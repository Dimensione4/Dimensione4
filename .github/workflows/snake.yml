name: Generate snake animation

on:
  schedule:
    # ogni giorno alle 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVG (brand teal)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Dimensione4
          outputs: |
            dist/github-snake.svg?color_snake=%2300D4D4&color_dots=%23E0F7F7,%2399E6E6,%2333CCCC,%2300AAAA,%23067A7A
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2300D4D4&color_dots=%230E7C7B,%23067A7A,%2300AAAA,%2300D4D4,%23E0F7F7

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
